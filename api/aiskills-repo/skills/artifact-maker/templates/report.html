<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.7;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Header */
        .report-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .report-header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #00d2ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .report-meta {
            color: #888;
            font-size: 0.9rem;
        }

        /* Sections */
        .section {
            margin-bottom: 2rem;
            padding: 1.5rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border-left: 3px solid #00d2ff;
        }

        .section h2 {
            color: #00d2ff;
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }

        .section h3 {
            color: #a78bfa;
            font-size: 1.1rem;
            margin: 1rem 0 0.5rem;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
            text-align: left;
            padding: 10px 14px;
            border-bottom: 2px solid rgba(0, 210, 255, 0.2);
        }

        td {
            padding: 8px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Lists */
        ul {
            list-style: none;
            padding-left: 0;
        }

        ul li::before {
            content: "▸ ";
            color: #00d2ff;
        }

        ul li {
            padding: 4px 0;
        }

        /* Code */
        code {
            background: rgba(0, 210, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.9em;
        }

        pre {
            background: #0f0f23;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow-x: auto;
        }

        /* Footer */
        .report-footer {
            text-align: center;
            padding: 2rem;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 3rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="report-header">
            <h1>{{ title }}</h1>
            <p class="report-meta">Generated by Nanoclaw Artifact Maker • {{ date }}</p>
        </div>

        {{ content }}

        <div class="report-footer">
            <p>📦 Artifact Maker v1.0 • Nanoclaw AI Skills</p>
        </div>
    </div>
</body>

</html>
