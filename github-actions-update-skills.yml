# GitHub Actions Workflow: Auto-Update AI Agent Skills
#
# This workflow automatically updates llms.txt skills when
# project dependencies change. It runs on pushes that modify
# dependency files and creates a PR with updated skills.
#
# Copy this file to .github/workflows/update-ai-skills.yml

name: Update AI Agent Skills

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'Cargo.toml'
      - 'go.mod'
      - 'Gemfile'
      - 'composer.json'
  schedule:
    # Weekly check for skill updates (Mondays at 6am UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force re-download all skills'
        type: boolean
        default: false

jobs:
  update-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and run llmstxt-cli
        run: |
          npm install -g llmstxt-cli
          
          if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
            llmstxt update --force
          elif [ -d ".agents/skills" ]; then
            llmstxt update
          else
            llmstxt init --yes
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "files=$(git diff --name-only | tr '\n' ', ')" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          title: "chore: update AI agent skills"
          commit-message: "chore: update AI agent skills"
          body: |
            ## Automated AI Skills Update
            
            Updated llms.txt skills for the following files:
            ${{ steps.changes.outputs.files }}
            
            These skills provide AI coding agents (Claude Code, Cursor, Copilot, etc.)
            with up-to-date documentation for project dependencies.
            
            ---
            *Generated by [llmstxt-skill-installer](https://llmstxthub.com)*
          branch: chore/update-ai-skills
          labels: |
            ai-skills
            dependencies
            automated
